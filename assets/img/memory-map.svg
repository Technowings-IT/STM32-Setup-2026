<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" font-family="system-ui, sans-serif">

  <!-- ── INTERNAL group ── -->
  <!-- Header chip -->
  <rect x="60" y="24" width="120" height="28" rx="6" fill="#2563eb"/>
  <text x="120" y="43" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Internal</text>

  <!-- 1 MB Internal Flash bar (height ~60px — compact relative to external) -->
  <rect x="60" y="66" width="240" height="60" rx="5" fill="#2563eb"/>
  <text x="180" y="93" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Internal Flash</text>
  <text x="180" y="111" text-anchor="middle" fill="white" font-size="12">1 MB</text>

  <!-- 340 KB RAM bar (height ~160px, subdivided) -->
  <rect x="60" y="146" width="240" height="230" rx="5" fill="#0e7490"/>
  <text x="180" y="170" text-anchor="middle" fill="white" font-size="13" font-weight="bold">RAM  —  340 KB total</text>

  <!-- Sub-sections inside RAM bar -->
  <!-- 256 KB System SRAM (biggest slice) -->
  <rect x="72" y="182" width="216" height="96" rx="3" fill="#0c6378"/>
  <text x="180" y="226" text-anchor="middle" fill="white" font-size="12" font-weight="bold">System SRAM</text>
  <text x="180" y="244" text-anchor="middle" fill="white" font-size="11">256 KB</text>

  <!-- 64 KB DTCM -->
  <rect x="72" y="284" width="216" height="38" rx="3" fill="#0a5466"/>
  <text x="180" y="308" text-anchor="middle" fill="white" font-size="11">DTCM  —  64 KB</text>

  <!-- 16 KB ITCM -->
  <rect x="72" y="328" width="216" height="24" rx="3" fill="#084455"/>
  <text x="180" y="344" text-anchor="middle" fill="white" font-size="10">ITCM  —  16 KB</text>

  <!-- 4 KB Backup -->
  <rect x="72" y="358" width="216" height="16" rx="3" fill="#063344"/>
  <text x="180" y="370" text-anchor="middle" fill="white" font-size="9">Backup SRAM  —  4 KB</text>

  <!-- ── EXTERNAL group ── -->
  <!-- Header chip -->
  <rect x="400" y="24" width="120" height="28" rx="6" fill="#7c3aed"/>
  <text x="460" y="43" text-anchor="middle" fill="white" font-size="14" font-weight="bold">External</text>

  <!-- 16 MB Quad-SPI NOR Flash bar (height ~160px — noticeably taller than internal flash) -->
  <rect x="400" y="66" width="260" height="160" rx="5" fill="#7c3aed"/>
  <text x="530" y="140" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Quad-SPI NOR Flash</text>
  <text x="530" y="160" text-anchor="middle" fill="white" font-size="12">16 MB  (128-Mbit)</text>
  <text x="530" y="103" text-anchor="middle" fill="white" font-size="10" opacity="0.8">GUI image assets</text>

  <!-- 128-Mbit SDRAM bar (height ~200px — comparable to QSPI, labeled clearly) -->
  <rect x="400" y="242" width="260" height="134" rx="5" fill="#b45309"/>
  <text x="530" y="306" text-anchor="middle" fill="white" font-size="13" font-weight="bold">SDRAM</text>
  <text x="530" y="326" text-anchor="middle" fill="white" font-size="12">128-Mbit</text>
  <text x="530" y="278" text-anchor="middle" fill="white" font-size="10" opacity="0.8">LCD framebuffer lives here</text>

  <!-- ── Scale note ── -->
  <rect x="200" y="406" width="320" height="22" rx="4" fill="#334155"/>
  <text x="360" y="421" text-anchor="middle" fill="white" font-size="11">Bar heights roughly proportional to size</text>

</svg>
