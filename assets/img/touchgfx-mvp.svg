<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240">
  <defs>
    <marker id="arrowhead-right" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowhead-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Model box -->
  <rect x="30" y="60" width="180" height="120" rx="12" ry="12" fill="#2563eb"/>
  <text x="120" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Model</text>
  <text x="120" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">data / backend</text>

  <!-- Presenter box -->
  <rect x="270" y="60" width="180" height="120" rx="12" ry="12" fill="#7c3aed"/>
  <text x="360" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">Presenter</text>
  <text x="360" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">glue / logic</text>

  <!-- View box -->
  <rect x="510" y="60" width="180" height="120" rx="12" ry="12" fill="#0e7490"/>
  <text x="600" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#ffffff">View</text>
  <text x="600" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">widgets / screen</text>

  <!-- Arrow: Model → Presenter (top) -->
  <line x1="212" y1="112" x2="268" y2="112" stroke="#94a3b8" stroke-width="2"
        marker-end="url(#arrowhead-right)"/>
  <!-- Arrow: Presenter → Model (bottom) -->
  <line x1="268" y1="128" x2="212" y2="128" stroke="#94a3b8" stroke-width="2"
        marker-end="url(#arrowhead-left)"/>

  <!-- Arrow: Presenter → View (top) -->
  <line x1="452" y1="112" x2="508" y2="112" stroke="#94a3b8" stroke-width="2"
        marker-end="url(#arrowhead-right)"/>
  <!-- Arrow: View → Presenter (bottom) -->
  <line x1="508" y1="128" x2="452" y2="128" stroke="#94a3b8" stroke-width="2"
        marker-end="url(#arrowhead-left)"/>
</svg>
