<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300" role="img" aria-label="Toolchain flow diagram">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- TouchGFX Designer box (top, above Generated C+HAL) -->
  <rect x="300" y="14" width="200" height="54" rx="8" ry="8" fill="#7c3aed"/>
  <text x="400" y="37" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">TouchGFX Designer</text>
  <text x="400" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">(generates C++)</text>

  <!-- Arrow: TouchGFX down into Generated C+HAL -->
  <line x1="400" y1="68" x2="400" y2="148" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 1: STM32CubeMX -->
  <rect x="20" y="150" width="180" height="60" rx="8" ry="8" fill="#2563eb"/>
  <text x="110" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">STM32CubeMX</text>
  <text x="110" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#bfdbfe">(.ioc file)</text>

  <!-- Arrow 1→2 -->
  <line x1="200" y1="180" x2="288" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 2: Generated C + HAL -->
  <rect x="290" y="150" width="200" height="60" rx="8" ry="8" fill="#0e7490"/>
  <text x="390" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">Generated C + HAL</text>
  <text x="390" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#a5f3fc">(startup &amp; init code)</text>

  <!-- Arrow 2→3 -->
  <line x1="490" y1="180" x2="548" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 3: STM32CubeIDE -->
  <rect x="550" y="150" width="180" height="60" rx="8" ry="8" fill="#2563eb"/>
  <text x="640" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">STM32CubeIDE</text>
  <text x="640" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#bfdbfe">(build / compile)</text>

  <!-- Arrow 3→4 -->
  <line x1="730" y1="180" x2="758" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Box 4: ST-LINK -->
  <rect x="760" y="150" width="140" height="60" rx="8" ry="8" fill="#475569"/>
  <text x="830" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">ST-LINK</text>
  <text x="830" y="194" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#e2e8f0">(flash via USB)</text>

  <!-- Arrow 4→5: curves down then right to board -->
  <!-- Using a simple angled line via a small gap -->
  <!-- Arrow leaving ST-LINK right side, then a label box "Board runs" -->

  <!-- Actually draw Board Runs as a box to the right but we have 920px width, let's place it below ST-LINK -->
  <!-- Place "Board runs" below ST-LINK at y=250 -->
  <rect x="760" y="240" width="140" height="46" rx="8" ry="8" fill="#15803d"/>
  <text x="830" y="259" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" font-weight="600">Board Runs!</text>
  <text x="830" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#bbf7d0">(STM32F746G)</text>

  <!-- Arrow ST-LINK down to Board runs -->
  <line x1="830" y1="210" x2="830" y2="238" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
